<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Direkta — Retro Theme Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:wght@400;500;600;700&family=Monoton&family=Outfit:wght@300;400;500;600;700&family=Lilita+One&family=Nunito:wght@400;600;700;800&family=Righteous&family=Hanken+Grotesk:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="themes/themes-shared.jsx"></script>
<script type="text/babel" src="themes/theme-matinee.jsx"></script>
<script type="text/babel" src="themes/theme-drivein.jsx"></script>
<script type="text/babel" src="themes/theme-popcorn.jsx"></script>
<script type="text/babel" src="themes/theme-saturday.jsx"></script>
<script type="text/babel" src="themes/theme-doublefeature.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="themes"
        title="Direkta · Retro-but-Modern UI Themes"
        subtitle="Five aesthetic directions inspired by your references — vintage cinema signs, marquee neon, concession cartoons, 70s Bass-era posters, grindhouse newsprint. Each card shows palette, type, controls, and an applied Direkta slice (top bar + production pipeline). Drag the title to rename, drag handles to reorder, or click ⤢ to focus."
      >
        <DCArtboard id="matinee"        label="01 · Matinee — Tin Sign"          width={920} height={1320}><ThemeMatinee/></DCArtboard>
        <DCArtboard id="drivein"        label="02 · Drive-In — Neon Marquee"     width={920} height={1320}><ThemeDriveIn/></DCArtboard>
        <DCArtboard id="popcorn"        label="03 · Popcorn — Chunky Cartoon"    width={920} height={1320}><ThemePopcorn/></DCArtboard>
        <DCArtboard id="saturday"       label="04 · Saturday 70s — Saul Bass"    width={920} height={1320}><ThemeSaturday/></DCArtboard>
        <DCArtboard id="doublefeature"  label="05 · Double Feature — Grindhouse" width={920} height={1320}><ThemeDoubleFeature/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
